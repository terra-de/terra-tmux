# ============================================================================
# terra-tmux — system tmux configuration
# Reproducible default config for the Terra DE environment.
# Override via ~/.config/terra/tmux/overrides.conf (sourced at bottom).
# Colours are managed by terratheme → ~/.config/terra/tmux/colors.conf.
# ============================================================================

# Reload
unbind r
bind r source-file /usr/share/terra/tmux/tmux.conf

# Passthrough for image protocols (Kitty/icat)
# set -gq allow-passthrough on
set -gq allow-passthrough off # currently a bug with some escape codes. not sure if issue is with tmux, foot, or opencode... but sixel seems to still work without passthrough so disable for now
set -g visual-activity off

set -g prefix C-Space

set -g mouse on
set -g default-terminal "tmux-256color"

# Base indices start at 1
set -g base-index 1
setw -g pane-base-index 1

# No confirmation
bind & unlink-window -k
bind -n M-x kill-pane
bind x kill-session

# Toggle status bar
bind C-o set -g status

set -g status-position bottom

set -s escape-time 0
set -s focus-events on
set -s extended-keys on

set -g xterm-keys on

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------

# Helper: detect if current pane is running nvim/vim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
# Helper: detect if nvim has the tmux-navigator integration loaded
has_nvim_nav="[ -f /tmp/nvim-tmux-nav-#{pane_id} ]"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# If nvim is running AND has our integration, pass keys through for smart
# edge-aware navigation. Otherwise switch tmux panes directly.
bind -n M-h if-shell "$is_vim && $has_nvim_nav" "send-keys M-h" "select-pane -L"
bind -n M-j if-shell "$is_vim && $has_nvim_nav" "send-keys M-j" "select-pane -D"
bind -n M-k if-shell "$is_vim && $has_nvim_nav" "send-keys M-k" "select-pane -U"
bind -n M-l if-shell "$is_vim && $has_nvim_nav" "send-keys M-l" "select-pane -R"

bind -n M-Left  if-shell "$is_vim && $has_nvim_nav" "send-keys M-Left"  "select-pane -L"
bind -n M-Down  if-shell "$is_vim && $has_nvim_nav" "send-keys M-Down"  "select-pane -D"
bind -n M-Up    if-shell "$is_vim && $has_nvim_nav" "send-keys M-Up"    "select-pane -U"
bind -n M-Right if-shell "$is_vim && $has_nvim_nav" "send-keys M-Right" "select-pane -R"

bind -r C-h resize-pane -L 10
bind -r C-j resize-pane -D 10
bind -r C-k resize-pane -U 10
bind -r C-l resize-pane -R 10

bind -T copy-mode-vi M-h select-pane -L
bind -T copy-mode-vi M-j select-pane -D
bind -T copy-mode-vi M-k select-pane -U
bind -T copy-mode-vi M-l select-pane -R

bind -T copy-mode-vi M-Left  select-pane -L
bind -T copy-mode-vi M-Down  select-pane -D
bind -T copy-mode-vi M-Up    select-pane -U
bind -T copy-mode-vi M-Right select-pane -R

bind -n M-s split-window -c "#{pane_current_path}"
bind -n M-v split-window -h -c "#{pane_current_path}"

bind -n M-t new-window -c "#{pane_current_path}"

bind -n M-. select-window -n
bind -n M-, select-window -p

unbind ]
unbind [

bind ] select-window -n
bind [ select-window -p

bind y copy-mode
bind -T copy-mode-vi y send -X copy-selection-and-cancel

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

# ---------------------------------------------------------------------------
# Theme — generic defaults
# ---------------------------------------------------------------------------
set -g @thm_bg "#1a1a1a"
set -g @thm_fg "#d0d0d0"
set -g @thm_accent "#4a9eff"
set -g @thm_muted "#666666"
set -g @thm_surface "#2a2a2a"
set -g @thm_border "#333333"
set -g @thm_red "#e05a5a"
set -g @thm_base "#111111"

set -g @mode_indicator_prefix_prompt ' PREFIX '
set -g @mode_indicator_copy_prompt ' COPY '
set -g @mode_indicator_sync_prompt ' SYNC '
set -g @mode_indicator_empty_prompt ' TMUX '

set -g @mode_indicator_empty_mode_style "bg=#1a1a1a,fg=#666666"
set -g @mode_indicator_prefix_mode_style "bg=#4a9eff,fg=#1a1a1a"
set -g @mode_indicator_copy_mode_style "bg=#d0d0d0,fg=#1a1a1a"
set -g @mode_indicator_sync_mode_style "bg=#e05a5a,fg=#1a1a1a"

# ---------------------------------------------------------------------------
# Terratheme generated colours (override generic defaults)
# ---------------------------------------------------------------------------
if-shell '[ -f ~/.config/terra/tmux/colors.conf ]' \
    'source-file ~/.config/terra/tmux/colors.conf'

# ---------------------------------------------------------------------------
# Status bar
# ---------------------------------------------------------------------------
set -g status-position bottom
set -g status-justify left
set -g status-left-length 80
set -g status-style "bg=#{@thm_bg},fg=#{@thm_fg}"
set -g status-left "#[bg=#{@thm_accent},fg=#{@thm_bg}]  #{session_name} "
set -g status-right "#[bg=#{@thm_bg},fg=#{@thm_fg}]#{tmux_mode_indicator}"

set -g window-status-format "#[fg=#{@thm_muted}] #I:#W "
set -g window-status-current-format "#[fg=#{@thm_fg},bold] #I:#W "
set -g window-status-separator " "

set -g window-status-style "fg=#{@thm_muted},bg=#{@thm_bg}"
set -g window-status-current-style "fg=#{@thm_fg},bg=#{@thm_bg},bold"
set -g window-status-last-style "fg=#{@thm_accent}"
set -g window-status-activity-style "fg=#{@thm_red}"
set -g window-status-bell-style "fg=#{@thm_red},bold"

set -g message-style "bg=#{@thm_surface},fg=#{@thm_fg}"
set -g message-command-style "bg=#{@thm_surface},fg=#{@thm_fg}"
set -g mode-style "bg=#{@thm_accent},fg=#{@thm_bg}"

set -g pane-active-border-style "fg=#{@thm_accent}"
set -g pane-border-style "fg=#{@thm_border}"

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
set -g @plugin 'MunifTanjim/tmux-suspend'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tpm'

set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# ---------------------------------------------------------------------------
# Plugin Options
# ---------------------------------------------------------------------------
set -g @scroll-down-exit-copy-mode "on"
set -g @scroll-without-changing-pane "on"
set -g @scroll-in-moused-over-pane "on"
set -g @scroll-speed-num-lines-per-scroll "3"
set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"
set -g @suspend_key 'F12'

# ---------------------------------------------------------------------------
# User overrides (sourced last so they take precedence over everything)
# ---------------------------------------------------------------------------
if-shell '[ -f ~/.config/terra/tmux/overrides.conf ]' \
    'source-file ~/.config/terra/tmux/overrides.conf'

# ---------------------------------------------------------------------------
# TPM bootstrap (keep at bottom)
# ---------------------------------------------------------------------------
if-shell '[ ! -d ~/.local/share/tmux/plugins/tpm ]' \
  'run-shell "git clone https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm"'

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'
run '~/.local/share/tmux/plugins/tpm/tpm'
